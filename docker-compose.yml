services:
  mysql:
    image: mysql:8.0
    container_name: sms-briefing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: sms_briefing
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sms_pass}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: sms-briefing-backend
    restart: unless-stopped
    working_dir: /app/backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: sms_briefing
      DB_USERNAME: sms_user
      DB_PASSWORD: ${MYSQL_PASSWORD:-sms_pass}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-sms-briefing-secret-key-must-be-at-least-32-characters}
      TZ: Asia/Shanghai
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8081:8080"

  frontend:
    image: node:20
    container_name: sms-briefing-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  maven_cache:
  frontend_node_modules:
