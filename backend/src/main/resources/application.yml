spring:
  application:
    name: sms-briefing-backend
  profiles:
    active: dev

server:
  port: 8080

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.sms.*.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: http://localhost:5173

sms:
  mock:
    success-rate: 85
