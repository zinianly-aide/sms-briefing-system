spring:
  application:
    name: sms-briefing-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sms_briefing}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

server:
  port: ${SERVER_PORT:8080}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
