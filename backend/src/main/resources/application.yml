spring:
  application:
    name: sms-briefing-backend
  profiles:
    active: dev

server:
  port: 8080

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.sms.*.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: http://localhost:5173

jwt:
  secret: ${JWT_SECRET:sms-briefing-secret-key-must-be-at-least-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}

sms:
  mock:
    success-rate: 85
